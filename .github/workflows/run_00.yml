name: "Bot 00: FULL Scanner (01-09)"

on:
  workflow_dispatch: # Handmatige start mogelijk via GitHub UI
  schedule:
     - cron: '30 5 * * *'

jobs:
  run_global:
    runs-on: ubuntu-latest
    
    # Voorkom dat meerdere runs tegelijk draaien als de vorige nog bezig is
    concurrency:
      group: scanner-run
      cancel-in-progress: false
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip' # Versnelt de installatie bij volgende runs

      - name: Bibliotheken installeren
        run: |
          pip install yfinance pandas requests python-dotenv numpy

      - name: Voer Globale Bot uit
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_00.py 
