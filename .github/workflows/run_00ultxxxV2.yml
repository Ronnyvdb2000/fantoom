6name: "Bot 00: FULL Scanner (041-060) xxx V2"

on:
  workflow_dispatch:
  schedule:
    - cron: '50 19 * * 0-6'

jobs:
  run_global:
    runs-on: ubuntu-latest

    concurrency:
      group: scanner-triplex-run
      cancel-in-progress: false

    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Bibliotheken installeren
        run: |
          pip install yfinance pandas requests python-dotenv numpy

      - name: Voer Triplex Bot uit
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_00xxxV2.py
