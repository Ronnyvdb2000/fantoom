name: "Bot 041: Diagnose Filter"

on:
  workflow_dispatch:
    inputs:
      lijsten:
        description: 'Welke lijsten scannen? (bijv: 041,042,043 of "alle")'
        required: false
        default: 'alle'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # max ~6 uur voor alle lijsten

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy requests

      # â”€â”€ Elke lijst als aparte stap met pauze â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

      - name: "Lijst 041 â€” Benelux"
        if: ${{ github.event.inputs.lijsten == 'alle' || contains(github.event.inputs.lijsten, '041') }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIAGNOSE_LIJST: "041"
        run: python bot_041m_diagnose.py

      - name: Pauze na 041
        if: ${{ github.event.inputs.lijsten == 'alle' }}
        run: sleep 60

      - name: "Lijst 042 â€” Parijs"
        if: ${{ github.event.inputs.lijsten == 'alle' || contains(github.event.inputs.lijsten, '042') }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIAGNOSE_LIJST: "042"
        run: python bot_041m_diagnose.py

      - name: Pauze na 042
        if: ${{ github.event.inputs.lijsten == 'alle' }}
        run: sleep 60

      - name: "Lijst 043 â€” Frankfurt"
        if: ${{ github.event.inputs.lijsten == 'alle' || contains(github.event.inputs.lijsten, '043') }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIAGNOSE_LIJST: "043"
        run: python bot_041m_diagnose.py

      - name: Pauze na 043
        if: ${{ github.event.inputs.lijsten == 'alle' }}
        run: sleep 60

      - name: "Lijst 044 â€” Spanje/Portugal"
        if: ${{ github.event.inputs.lijsten == 'alle' || contains(github.event.inputs.lijsten, '044') }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIAGNOSE_LIJST: "044"
        run: python bot_041m_diagnose.py

      - name: Pauze na 044
        if: ${{ github.event.inputs.lijsten == 'alle' }}
        run: sleep 60

      - name: "Lijst 045 â€” Londen"
        if: ${{ github.event.inputs.lijsten == 'alle' || contains(github.event.inputs.lijsten, '045') }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIAGNOSE_LIJST: "045"
        run: python bot_041m_diagnose.py

      - name: Pauze na 045
        if: ${{ github.event.inputs.lijsten == 'alle' }}
        run: sleep 60

      - name: "Lijst 046 â€” Milaan"
        if: ${{ github.event.inputs.lijsten == 'alle' || contains(github.event.inputs.lijsten, '046') }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIAGNOSE_LIJST: "046"
        run: python bot_041mV2.py

      - name: Pauze na 046
        if: ${{ github.event.inputs.lijsten == 'alle' }}
        run: sleep 60

      - name: "Lijst 047 â€” Toronto"
        if: ${{ github.event.inputs.lijsten == 'alle' || contains(github.event.inputs.lijsten, '047') }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIAGNOSE_LIJST: "047"
        run: python bot_041m_diagnose.py

      - name: Pauze na 047
        if: ${{ github.event.inputs.lijsten == 'alle' }}
        run: sleep 60

      - name: "Lijst 048 â€” Nasdaq/NYSE"
        if: ${{ github.event.inputs.lijsten == 'alle' || contains(github.event.inputs.lijsten, '048') }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DIAGNOSE_LIJST: "048"
        run: python bot_041m_diagnose.py

      # â”€â”€ Resultaten committen â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Commit diagnoseresultaten
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add diagnose_*.txt
          if git diff --staged --quiet; then
            echo "Geen diagnosebestanden gevonden."
          else
            git commit -m "Diagnose filterresultaten $(date +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
